<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCL Premium Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SAFE LOCAL STORAGE HELPERS ---
        // These prevent the app from crashing to a blank screen if data is corrupted or blocked
        const loadSafe = (key, defaultVal) => {
            try {
                const stored = localStorage.getItem(key);
                if (!stored) return defaultVal;
                const parsed = JSON.parse(stored);
                // Ensure arrays stay arrays (prevents .map crashes)
                if (Array.isArray(defaultVal) && !Array.isArray(parsed)) return defaultVal;
                return parsed;
            } catch (e) {
                console.warn(`Could not load ${key} from storage.`, e);
                return defaultVal;
            }
        };

        const saveSafe = (key, value) => {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                console.warn(`Could not save ${key} to storage.`, e);
            }
        };

        // -----------------------------------------
        // 1. STOREFRONT COMPONENT
        // -----------------------------------------
        function UserStore({ settings, products, onPlaceOrder }) {
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [customer, setCustomer] = useState({ name: '', email: '' });

            const handleCheckout = (e) => {
                e.preventDefault();
                onPlaceOrder(customer, selectedProduct);
                setSelectedProduct(null);
                setCustomer({ name: '', email: '' }); // Reset form
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-12">
                    <div className="text-center mb-16">
                        {settings.logo ? (
                            <img src={settings.logo} alt="Logo" className="h-20 mx-auto mb-4 object-contain" />
                        ) : (
                            <h1 className="text-5xl font-extrabold text-white tracking-tight drop-shadow-lg">{settings.storeName}</h1>
                        )}
                    </div>

                    {products.length === 0 ? (
                        <p className="text-center text-white/70 text-xl">No products available right now.</p>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {products.map((product) => (
                                <div key={product.id} className="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-6 flex flex-col hover:transform hover:scale-105 transition-all shadow-xl">
                                    <h2 className="text-2xl font-bold text-white mb-2">{product.name}</h2>
                                    <p className="text-gray-300 text-sm mb-4 flex-grow whitespace-pre-wrap">{product.description}</p>
                                    <div className="flex justify-between items-center mt-4">
                                        <span className="text-3xl font-extrabold text-emerald-400">₦{product.price}</span>
                                        <button 
                                            onClick={() => setSelectedProduct(product)}
                                            className="px-6 py-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-lg shadow-lg"
                                        >
                                            Buy Now
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {selectedProduct && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                            <div className="bg-gray-900 border border-gray-700 p-8 rounded-2xl max-w-md w-full shadow-2xl">
                                <h3 className="text-2xl font-bold text-white mb-4">Checkout: {selectedProduct.name}</h3>
                                <p className="text-emerald-400 font-bold mb-6">Total: ₦{selectedProduct.price}</p>
                                
                                <form onSubmit={handleCheckout} className="space-y-4">
                                    <input 
                                        type="text" required placeholder="Your Full Name"
                                        value={customer.name} onChange={e => setCustomer({...customer, name: e.target.value})}
                                        className="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white outline-none focus:border-emerald-500"
                                    />
                                    <input 
                                        type="email" required placeholder="Your Email Address"
                                        value={customer.email} onChange={e => setCustomer({...customer, email: e.target.value})}
                                        className="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white outline-none focus:border-emerald-500"
                                    />
                                    <div className="flex gap-4 mt-6">
                                        <button type="button" onClick={() => setSelectedProduct(null)} className="flex-1 px-4 py-3 bg-gray-700 text-white rounded-lg hover:bg-gray-600 transition">Cancel</button>
                                        <button type="submit" className="flex-1 px-4 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-lg transition">Proceed to Pay</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // -----------------------------------------
        // 2. ADMIN DASHBOARD COMPONENT
        // -----------------------------------------
        function AdminDashboard({ settings, setSettings, products, setProducts, orders }) {
            const [activeTab, setActiveTab] = useState('products');
            const [newProduct, setNewProduct] = useState({ name: '', price: '', description: '', redirectUrl: '' });

            const handleImageUpload = (e, settingKey) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setSettings({ ...settings, [settingKey]: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                setProducts([{ ...newProduct, id: Date.now().toString() }, ...products]);
                setNewProduct({ name: '', price: '', description: '', redirectUrl: '' }); // Reset
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <div className="bg-gray-900/90 backdrop-blur-xl border border-gray-700 rounded-2xl shadow-2xl overflow-hidden">
                        <div className="flex border-b border-gray-700 bg-gray-800/50">
                            {['products', 'orders', 'settings'].map(tab => (
                                <button 
                                    key={tab} onClick={() => setActiveTab(tab)}
                                    className={`flex-1 py-4 text-lg font-bold capitalize transition-colors ${activeTab === tab ? 'text-emerald-400 border-b-2 border-emerald-400' : 'text-gray-400 hover:text-white'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>

                        <div className="p-8">
                            {activeTab === 'products' && (
                                <div className="space-y-8">
                                    <form onSubmit={handleAddProduct} className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-800/50 p-6 rounded-xl border border-gray-700">
                                        <h3 className="col-span-full text-xl font-bold text-white mb-2">Add New Product</h3>
                                        <input required type="text" placeholder="Product Name" className="p-3 bg-gray-900 border border-gray-600 rounded text-white outline-none focus:border-emerald-500" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} />
                                        <input required type="number" placeholder="Price (₦)" className="p-3 bg-gray-900 border border-gray-600 rounded text-white outline-none focus:border-emerald-500" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} />
                                        <input required type="url" placeholder="Payment Redirect URL (e.g. Paystack link)" className="col-span-full p-3 bg-gray-900 border border-gray-600 rounded text-white outline-none focus:border-emerald-500" value={newProduct.redirectUrl} onChange={e => setNewProduct({...newProduct, redirectUrl: e.target.value})} />
                                        <textarea required placeholder="Product Description" className="col-span-full p-3 bg-gray-900 border border-gray-600 rounded text-white h-24 outline-none focus:border-emerald-500" value={newProduct.description} onChange={e => setNewProduct({...newProduct, description: e.target.value})} />
                                        <button type="submit" className="col-span-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded shadow-lg transition">Publish Product</button>
                                    </form>

                                    <div className="space-y-4">
                                        {products.length === 0 ? <p className="text-gray-500">No products added yet.</p> : products.map(p => (
                                            <div key={p.id} className="flex justify-between items-center p-4 bg-gray-800 border border-gray-700 rounded-lg">
                                                <div>
                                                    <h4 className="text-white font-bold text-lg">{p.name} <span className="text-emerald-400 ml-2">₦{p.price}</span></h4>
                                                    <p className="text-gray-400 text-sm overflow-hidden text-ellipsis whitespace-nowrap max-w-xs md:max-w-md">URL: {p.redirectUrl}</p>
                                                </div>
                                                <button onClick={() => setProducts(products.filter(item => item.id !== p.id))} className="px-4 py-2 bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white rounded transition">Delete</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'orders' && (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-gray-300 border-collapse">
                                        <thead className="text-white bg-gray-800">
                                            <tr>
                                                <th className="p-4 rounded-tl-lg">Order ID</th>
                                                <th className="p-4">Customer</th>
                                                <th className="p-4">Item & Price</th>
                                                <th className="p-4 rounded-tr-lg">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {orders.length === 0 ? (<tr><td colSpan="4" className="p-4 text-center">No orders yet.</td></tr>) : orders.map(order => (
                                                <tr key={order.id} className="border-b border-gray-700">
                                                    <td className="p-4 font-bold">{order.id}</td>
                                                    <td className="p-4"><p className="font-bold text-white">{order.customerName}</p><p className="text-sm text-gray-400">{order.customerEmail}</p></td>
                                                    <td className="p-4"><p>{order.productName}</p><p className="text-emerald-400 font-bold">₦{order.price}</p></td>
                                                    <td className="p-4"><span className="px-3 py-1 bg-yellow-500/20 text-yellow-400 rounded-full text-sm font-bold">Pending</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="space-y-6 max-w-xl">
                                    <div>
                                        <label className="block text-white font-bold mb-2">Store Name</label>
                                        <input type="text" className="w-full p-3 bg-gray-800 border border-gray-600 rounded text-white outline-none focus:border-emerald-500" value={settings.storeName} onChange={e => setSettings({...settings, storeName: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-white font-bold mb-2">Upload Logo Image</label>
                                        <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'logo')} className="block w-full text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-emerald-500/10 file:text-emerald-400 hover:file:bg-emerald-500/20 transition cursor-pointer" />
                                        {settings.logo && <img src={settings.logo} alt="Preview" className="mt-4 h-16 object-contain bg-white/10 p-2 rounded" />}
                                    </div>
                                    <div>
                                        <label className="block text-white font-bold mb-2">Upload Background Image</label>
                                        <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'background')} className="block w-full text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-emerald-500/10 file:text-emerald-400 hover:file:bg-emerald-500/20 transition cursor-pointer" />
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // -----------------------------------------
        // 3. MAIN APP ROUTER COMPONENT
        // -----------------------------------------
        function App() {
            const [isAdmin, setIsAdmin] = useState(false);
            
            // Safe Initializations
            const [settings, setSettings] = useState(() => loadSafe('kclSettings', {
                storeName: 'KCL Digital Store',
                logo: '',
                background: 'https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=1920&q=80'
            }));
            const [products, setProducts] = useState(() => loadSafe('kclProducts', []));
            const [orders, setOrders] = useState(() => loadSafe('kclOrders', []));

            // Safe Saving
            useEffect(() => saveSafe('kclSettings', settings), [settings]);
            useEffect(() => saveSafe('kclProducts', products), [products]);
            useEffect(() => saveSafe('kclOrders', orders), [orders]);

            const handlePlaceOrder = (customerData, product) => {
                const newOrder = {
                    id: 'ORD-' + Math.floor(Math.random() * 1000000),
                    customerName: customerData.name,
                    customerEmail: customerData.email,
                    productName: product.name,
                    price: product.price,
                    status: 'Payment Pending'
                };
                setOrders([newOrder, ...orders]);
                
                // Add a small delay so the order saves to memory before redirecting
                setTimeout(() => {
                    if (product.redirectUrl) {
                        window.location.href = product.redirectUrl;
                    } else {
                        alert("Error: Admin has not set a payment URL for this product.");
                    }
                }, 500);
            };

            return (
                <div className="min-h-screen bg-cover bg-center bg-fixed transition-all duration-500" style={{ backgroundImage: `url(${settings.background})` }}>
                    <div className="min-h-screen bg-black/60 backdrop-blur-sm">
                        <nav className="p-4 flex justify-end">
                            <button onClick={() => setIsAdmin(!isAdmin)} className="px-4 py-2 bg-white/20 hover:bg-white/30 text-white font-bold rounded-lg backdrop-blur-md border border-white/30 transition-all">
                                {isAdmin ? 'View Storefront' : 'Admin Login'}
                            </button>
                        </nav>
                        {isAdmin ? (
                            <AdminDashboard settings={settings} setSettings={setSettings} products={products} setProducts={setProducts} orders={orders} />
                        ) : (
                            <UserStore settings={settings} products={products} onPlaceOrder={handlePlaceOrder} />
                        )}
                    </div>
                </div>
            );
        }

        // -----------------------------------------
        // 4. RENDER ROOT
        // -----------------------------------------
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
